<!DOCTYPE html>
<html>
<head>
<title>Simple Web Page</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background-color: #f2f2f2;
}

button{
    padding: 10px 20px;
    font-size: 16px;
}
</style>

<script>
function showMessage(){
    alert("Hello! You clicked the button.");
}
</script>

</head>

<body>

<h1>My Simple Website</h1>
<p>Click the button below.</p>

<button onclick="showMessage()">Click Me</button>

</body>
</html>
